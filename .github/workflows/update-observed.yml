name: Update Avalon observed

on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-observed:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Build observed.json from USGS observed water level
        shell: bash
        run: |
          python - <<'PY'
          import json
          import math
          import urllib.parse
          import urllib.request
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          from zoneinfo import ZoneInfo

          # Avalon USGS observed gauge
          SITE = "01411355"
          PARAMETER_CD = "72279"
          DATUM = "NAVD88"
          TIME_ZONE = "EST"

          NAVD88_OFFSET_FROM_MLLW = -2.85

          THRESHOLDS_MLLW = {
              "minorLow": 6.0,
              "moderateLow": 7.0,
              "majorLow": 8.0
          }

          THRESHOLDS_NAVD88 = {
              "minorLow": 3.15,
              "moderateLow": 4.15,
              "majorLow": 5.15
          }

          ARCHIVE_START_DATE = "2007-10-01"
          OUT_PATH = Path("observed.json")

          # 31-day chunks keep the USGS response reliable.
          CHUNK_DAYS = 31
          EASTERN = ZoneInfo("America/New_York")
          FIXED_EST = timezone(timedelta(hours=-5))

          def fetch_json(url):
              req = urllib.request.Request(
                  url,
                  headers={"User-Agent": "Mozilla/5.0"}
              )
              with urllib.request.urlopen(req, timeout=180) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          def usgs_iv_url(start_date, end_date):
              params = {
                  "format": "json",
                  "sites": SITE,
                  "parameterCd": PARAMETER_CD,
                  "startDT": start_date,
                  "endDT": end_date,
                  "siteStatus": "all"
              }
              return "https://waterservices.usgs.gov/nwis/iv/?" + urllib.parse.urlencode(params)

          def parse_usgs_datetime(s):
              # USGS usually returns ISO strings with an offset, such as 2026-05-12T10:15:00.000-04:00.
              return datetime.fromisoformat(s.replace("Z", "+00:00"))

          def round_hundredth(x):
              return round(float(x) + 1e-9, 2)

          def classify_peak(peak):
              if peak is None or not math.isfinite(peak):
                  return "none"
              if peak >= THRESHOLDS_NAVD88["majorLow"]:
                  return "major"
              if peak >= THRESHOLDS_NAVD88["moderateLow"]:
                  return "moderate"
              if peak >= THRESHOLDS_NAVD88["minorLow"]:
                  return "minor"
              return "none"

          today_utc = datetime.now(timezone.utc)
          archive_start = datetime.strptime(ARCHIVE_START_DATE, "%Y-%m-%d").date()
          archive_end = today_utc.astimezone(EASTERN).date()

          hourly_max = {}
          source_urls = []

          cur = archive_start
          while cur <= archive_end:
              end = min(cur + timedelta(days=CHUNK_DAYS - 1), archive_end)
              url = usgs_iv_url(cur.isoformat(), end.isoformat())
              source_urls.append(url)

              print(f"Fetching {cur.isoformat()} through {end.isoformat()}")
              data = fetch_json(url)

              series = data.get("value", {}).get("timeSeries", [])
              if series:
                  values = series[0].get("values", [])
                  if values:
                      for item in values[0].get("value", []):
                          raw_value = item.get("value")
                          try:
                              stage = round_hundredth(raw_value)
                          except Exception:
                              continue

                          dt = parse_usgs_datetime(item["dateTime"]).astimezone(EASTERN)

                          # Store as fixed EST because the web app's historic archive uses timeEST.
                          dt_est = dt.astimezone(FIXED_EST)
                          day_key = dt_est.date().isoformat()
                          hour_index = dt_est.hour
                          key = (day_key, hour_index)

                          old = hourly_max.get(key)
                          if old is None or stage > old["navd88StageFt"]:
                              hourly_max[key] = {
                                  "hourIndex": hour_index,
                                  "timeEST": dt_est.replace(minute=0, second=0, microsecond=0).isoformat(),
                                  "navd88StageFt": stage,
                                  "mllwStageFt": round(stage - NAVD88_OFFSET_FROM_MLLW, 2)
                              }

              cur = end + timedelta(days=1)

          days = []
          day = archive_start
          while day <= archive_end:
              day_key = day.isoformat()
              hours = []
              for hour in range(24):
                  rec = hourly_max.get((day_key, hour))
                  if rec is not None:
                      hours.append(rec)

              if hours:
                  peak = round_hundredth(max(h["navd88StageFt"] for h in hours))
                  days.append({
                      "date": day_key,
                      "classification": classify_peak(peak),
                      "peakNAVD88": peak,
                      "peakMLLW": round(peak - NAVD88_OFFSET_FROM_MLLW, 2),
                      "hours": hours
                  })

              day += timedelta(days=1)

          payload = {
              "site": SITE,
              "parameterCd": PARAMETER_CD,
              "datum": DATUM,
              "timeZone": TIME_ZONE,
              "method": "hourly_max_all_history_v1",
              "lastProcessedISO": today_utc.replace(microsecond=0).isoformat().replace("+00:00", "Z"),
              "archiveStartDate": ARCHIVE_START_DATE,
              "archiveEndDate": archive_end.isoformat(),
              "navd88OffsetFromMllwFt": NAVD88_OFFSET_FROM_MLLW,
              "thresholdsMLLW": THRESHOLDS_MLLW,
              "thresholdsNAVD88": THRESHOLDS_NAVD88,
              "sourceType": "USGS_NWIS_instantaneous_values_hourly_max",
              "sourceUrlTemplate": "https://waterservices.usgs.gov/nwis/iv/?format=json&sites=01411355&parameterCd=72279&startDT=YYYY-MM-DD&endDT=YYYY-MM-DD&siteStatus=all",
              "days": days
          }

          if not days:
              raise RuntimeError("No observed days were found. Check the USGS site, parameter code, or service response.")

          OUT_PATH.write_text(json.dumps(payload, indent=2), encoding="utf-8")
          print("Wrote", OUT_PATH)
          print("Days:", len(days))
          print("Archive:", ARCHIVE_START_DATE, "to", archive_end.isoformat())
          print("Latest day:", days[-1]["date"], days[-1]["classification"], days[-1]["peakNAVD88"])
          PY

      - name: Commit updated observed archive
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add observed.json
          git diff --staged --quiet || git commit -m "Update Avalon observed"
          git push
